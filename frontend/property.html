<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        تفاصيل العقار | إسكندرية بيتك
    </title>

    <link rel="stylesheet"
        href="./css/property.css">

</head>

<body>


    <!--====================
            NAVBAR
    =====================-->

    <nav class="navbar">

        <a href="index.html">

            الرئيسية

        </a>


        <a href="properties.html">

            العقارات

        </a>


        <a href="admin-login.html">

            دخول الإدارة

        </a>

    </nav>



    <!--====================
          PROPERTY IMAGES
    =====================-->

    <section class="images-section">

        <img id="mainImage"
            src=""
            alt="Property Image">


    </section>




    <!--====================
          PROPERTY DETAILS
    =====================-->

    <section class="property-details">


        <h1 id="title">

        </h1>


        <h2 id="price">

        </h2>


        <p id="city">

        </p>


        <p id="area">

        </p>


        <p id="space">

        </p>


        <p id="bedrooms">

        </p>


        <p id="bathrooms">

        </p>


        <p id="floor">

        </p>


        <p id="propertyType">

        </p>


        <p id="purpose">

        </p>


        <p id="description">

        </p>


    </section>




    <!--====================
            FEATURES
    =====================-->


    <section class="features-section">


        <h2>

            مميزات العقار

        </h2>


        <ul>

            <li id="parking"></li>

            <li id="elevator"></li>

            <li id="furnished"></li>

            <li id="airConditioning"></li>

            <li id="internet"></li>

            <li id="gas"></li>

            <li id="kitchen"></li>

            <li id="security"></li>

        </ul>


    </section>




    <!--====================
              VIDEOS
    =====================-->



    <section class="videos-section">


        <h2>

            فيديوهات العقار

        </h2>


        <div id="videosContainer">

        </div>


    </section>





    <!--====================
            CONTACT
    =====================-->



    <section class="contact-section">


        <button id="whatsappButton">

            WhatsApp

        </button>


        <button id="messengerButton">

            Messenger

        </button>



        <button id="callButton">

            اتصل الآن

        </button>


    </section>




    <!--====================
          FAVORITE & SHARE
    =====================-->



    <section class="action-buttons">


        <button id="favoriteButton">

            إضافة إلى المفضلة

        </button>



        <button id="shareButton">

            مشاركة العقار

        </button>



    </section>




    <!--====================
          BACK BUTTON
    =====================-->


    <section class="back-section">


        <a href="index.html">

            العودة للرئيسية

        </a>


    </section>




    <!--====================
            FOOTER
    =====================-->


    <footer>


        جميع الحقوق محفوظة © Alexandria Baytak


    </footer>




    <script src="./js/property.js">

    </script>


</body>

</html>
