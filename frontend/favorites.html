<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">


<title>

تعديل العقار

</title>


<link rel="stylesheet"

href="./css/dashboard.css">


</head>


<body>



<nav class="navbar">


<a href="dashboard.html">

لوحة التحكم

</a>


<a href="properties.html">

العقارات

</a>


<a href="request.html">

إضافة عقار

</a>


</nav>




<section class="dashboard-title">


<h1>

تعديل العقار

</h1>


<p>

قم بتعديل بيانات العقار.

</p>


</section>




<section class="dashboard-cards">



<div class="card">


<input

type="text"

id="propertyID"

placeholder="رقم العقار">


<br><br>



<input

type="text"

id="title"

placeholder="عنوان العقار">


<br><br>



<input

type="number"

id="price"

placeholder="السعر">


<br><br>



<input

type="number"

id="space"

placeholder="المساحة">


<br><br>



<button

onclick="updateProperty()">

حفظ التعديلات

</button>



</div>




</section>




<footer>

جميع الحقوق محفوظة © Alexandria Baytak

</footer>




<script src="./js/config.js">

</script>



<script src="./js/dashboard.js">

</script>



<script>


//==================================
//          UPDATE PROPERTY
//==================================


async function updateProperty(){



const propertyID =

document.getElementById(

"propertyID"

).value;



const title =

document.getElementById(

"title"

).value;



const price =

document.getElementById(

"price"

).value;



const space =

document.getElementById(

"space"

).value;



try{


const response =

await fetch(


`${API_URL}/properties/${propertyID}`,

{

method:"PUT",

headers:{

"Content-Type":

"application/json"

},


body:JSON.stringify({

title,
price,
space

})

}


);



const data =

await response.json();



alert(

data.message ||

"تم تعديل العقار بنجاح."

);


}



catch(error){


console.log(error);


alert(

"حدث خطأ أثناء تعديل العقار."

);


}



}



</script>



</body>

</html>
