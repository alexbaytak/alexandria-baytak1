<section class="dashboard-title">


<h1>

رفع الصور والفيديوهات

</h1>


<p>

قم برفع ملفات العقارات بسهولة.

</p>


</section>





<section class="dashboard-cards">


<div class="card">


<h2>

رفع الصور

</h2>



<input

type="file"

id="images"

accept="image/*"

multiple>



<br><br>


<button

onclick="uploadImages()">

رفع الصور

</button>


</div>





<div class="card">


<h2>

رفع الفيديوهات

</h2>


<input

type="file"

id="videos"

accept="video/*"

multiple>



<br><br>



<button

onclick="uploadVideos()">

رفع الفيديوهات

</button>



</div>



</section>
